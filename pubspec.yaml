name: cashvault_local
description: CashVault Local offline Windows desktop app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.20.0
  sqlite3: ^2.4.6
  path_provider: ^2.1.4
  path: ^1.9.0
  file_picker: ^8.0.7
  csv: ^6.0.0
  intl: ^0.19.0
  cryptography: ^2.7.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.20.0
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
